<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>我的履歷</title>
  <style>
    body {
      font-family: Arial;
      margin: 40px;
      background: #f5f5f5;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 600px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h1 { color: #333; }
  </style>
</head>
<body>
  <div class="card">
    <h1>你的名字</h1>
    <p><b>學號：</b>你的學號</p>
    
    <h2>自我介紹</h2>
    <p>這裡寫你的介紹（例如：我是一名學生...）</p>

    <h2>技能</h2>
    <ul>
      <li>HTML</li>
      <li>Python</li>
    </ul>

    <h2>聯絡方式</h2>
    <p>Email: your@email.com</p>
  </div>
</body>
</html>
